name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["**"]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                node-version: [22]
                os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Enable corepack
              run: corepack enable

            - name: Activate chosen package manager
              run: corepack prepare --activate

            - name: Install dependencies
              run: yarn

            - name: Build
              run: yarn build

            - name: Run Tact formatter
              run: yarn fmt:check

            - name: Run Misti
              run: yarn lint

            - name: Run tests
              run: yarn test

    deploy:
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        needs: test
        runs-on: self-hosted
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Enable corepack
              run: corepack enable

            - name: Activate chosen package manager
              run: corepack prepare --activate

            - name: Install dependencies
              run: yarn

            - name: Build artifacts
              run: yarn build

            - name: Run Ansible playbook
              uses: dawidd6/action-ansible-playbook@v2
              with:
                  playbook: deploy_dev.yml
                  directory: ./ansible/playbooks
                  options: |
                      -i ../inventory/dev.yml
